<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #43cea2, #185a9d, #ff6a00, #ee0979);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 600px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      animation: fadeIn 1.2s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.95);}
      to {opacity: 1; transform: scale(1);}
    }

    .thankYouMsg {
      color: #28a745;
      font-size: 24px;
      margin-bottom: 25px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(40,167,69,0.6);
    }

    .buttons .btn {
      display: inline-block;
      text-decoration: none;
      background: #007BFF;
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .buttons .btn:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    button {
      margin-top: 20px;
      background: #444;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="thankYouMsg">🎉 Thank You! Your submission has been received. 🎉</h2>
    <div class="buttons">
      <a href="index.html" class="btn">Back to Home</a>
    </div>

    <!-- Speak button inside container -->
    <button type="button" onclick="readThankYou()">🔊 Speak</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
